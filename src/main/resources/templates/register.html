<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | YourApp</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-400 via-purple-500 to-pink-300 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-6">

    <!-- Card -->
    <div class="bg-white/20 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-white/30">

        <!-- Heading -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Create Account</h2>
            <p class="text-white/80 text-sm mt-2">Join us and get started</p>
        </div>

        <!-- Form -->
        <form th:action="@{/processing-register}" 
              method="post" 
              th:object="${user}" 
              class="space-y-5">

            <!-- Name -->
            <div>
                <label class="block text-sm text-white mb-2">Full Name</label>
                <input type="text"
                       th:field="*{name}"
                       placeholder="Enter your name"
                       required
                       class="w-full px-4 py-3 rounded-xl bg-white/30 text-white 
                              placeholder-white/70 focus:outline-none 
                              focus:ring-2 focus:ring-white transition duration-300"/>
                <p th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"
                   class="text-red-200 text-sm mt-1"></p>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm text-white mb-2">Email</label>
                <input type="email"
                       th:field="*{email}"
                       placeholder="Enter your email"
                       required
                       class="w-full px-4 py-3 rounded-xl bg-white/30 text-white 
                              placeholder-white/70 focus:outline-none 
                              focus:ring-2 focus:ring-white transition duration-300"/>
                <p th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}"
                   class="text-red-200 text-sm mt-1"></p>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm text-white mb-2">Password</label>
                <input type="password"
                       th:field="*{password}"
                       placeholder="Create a password"
                       required
                       class="w-full px-4 py-3 rounded-xl bg-white/30 text-white 
                              placeholder-white/70 focus:outline-none 
                              focus:ring-2 focus:ring-white transition duration-300"/>
                <p th:if="${#fields.hasErrors('password')}"
                   th:errors="*{password}"
                   class="text-red-200 text-sm mt-1"></p>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full bg-white text-purple-700 font-semibold py-3 
                           rounded-xl hover:bg-purple-100 
                           transition duration-300 shadow-lg">
                Create Account
            </button>

        </form>

        <!-- Divider -->
        <div class="my-6 border-t border-white/30"></div>

        <!-- Login Redirect -->
        <p class="text-center text-sm text-white">
            Already have an account?
            <a th:href="@{/login}" class="font-semibold hover:underline">
                Sign in
            </a>
        </p>

    </div>

    <!-- Footer -->
    <p class="text-center text-white/80 text-xs mt-6">
        © 2026 YourApp. All rights reserved.
    </p>

</div>

</body>
</html>
