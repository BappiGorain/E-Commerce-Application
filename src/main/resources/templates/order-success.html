<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Success</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body
      {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200">
    <!-- NAVBAR -->
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="min-h-screen flex items-center justify-center px-6">
      <div
        class="bg-white dark:bg-slate-900 shadow-xl rounded-2xl p-10 text-center max-w-lg w-full border border-gray-200 dark:border-slate-800"
      >
        <!-- SUCCESS ICON -->

        <div class="flex justify-center mb-6">
          <div
            class="w-20 h-20 flex items-center justify-center rounded-full bg-green-100"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-10 w-10 text-green-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
          </div>
        </div>

        <!-- TITLE -->

        <h2
          class="text-3xl font-bold bg-gradient-to-r from-green-500 to-emerald-600 text-transparent bg-clip-text mb-4"
        >
          Order Placed Successfully!
        </h2>

        <!-- MESSAGE -->

        <p class="text-gray-600 dark:text-gray-300 mb-2">
          Thank you for your purchase.
        </p>

        <p class="text-gray-500 mb-8">
          We will notify you once your order is shipped.
        </p>

        <!-- BUTTONS -->

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a
            th:href="@{/user/products}"
            class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition shadow-lg"
          >
            Continue Shopping
          </a>

          <a
            th:href="@{/user/orders}"
            class="px-6 py-3 bg-gray-200 dark:bg-slate-800 rounded-xl font-semibold hover:bg-gray-300 dark:hover:bg-slate-700 transition"
          >
            View My Orders
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
