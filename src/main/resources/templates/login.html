<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ShopSmart</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

/* Fade animation */

@keyframes fadeUp{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}

.fade-up{
animation:fadeUp .8s ease forwards;
}

</style>

</head>


<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500
min-h-screen flex items-center justify-center
text-gray-800">


<div class="w-full max-w-md px-6 fade-up">


<!-- LOGIN CARD -->

<div class="bg-white/20 backdrop-blur-xl
rounded-2xl
shadow-2xl
border border-white/30
p-8">


<!-- HEADER -->

<div class="text-center mb-8">

<h2 class="text-3xl font-bold text-white">

Welcome Back

</h2>

<p class="text-white/80 text-sm mt-2">

Sign in to continue to ShopSmart

</p>

</div>



<!-- LOGIN FORM -->

<form th:action="@{/doLogin}" method="post" class="space-y-6">


<!-- EMAIL -->

<div>

<label class="block text-sm text-white mb-2">

Email Address

</label>

<input
type="email"
name="email"
placeholder="Enter your email"
required

class="w-full px-4 py-3
rounded-xl
bg-white/30
text-white
placeholder-white/70
border border-white/30
focus:outline-none
focus:ring-2
focus:ring-white
transition">

</div>



<!-- PASSWORD -->

<div>

<label class="block text-sm text-white mb-2">

Password

</label>

<input
type="password"
name="password"
placeholder="Enter your password"
required

class="w-full px-4 py-3
rounded-xl
bg-white/30
text-white
placeholder-white/70
border border-white/30
focus:outline-none
focus:ring-2
focus:ring-white
transition">

</div>



<!-- REMEMBER -->

<div class="flex items-center justify-between text-sm text-white">

<label class="flex items-center gap-2">

<input type="checkbox" class="rounded">

<span>Remember me</span>

</label>

<a href="#" class="hover:underline">

Forgot password?

</a>

</div>



<!-- LOGIN BUTTON -->

<button
type="submit"

class="w-full
bg-white
text-purple-700
font-semibold
py-3
rounded-xl
hover:bg-purple-100
hover:scale-[1.02]
transition
shadow-lg">

Sign In

</button>


</form>



<!-- DIVIDER -->

<div class="my-6 border-t border-white/30"></div>



<!-- REGISTER -->

<p class="text-center text-sm text-white">

Don't have an account?

<a th:href="@{/register}"
class="font-semibold hover:underline">

Create one

</a>

</p>


</div>



<!-- FOOTER -->

<p class="text-center text-white/80 text-xs mt-6">

© 2026 ShopSmart. All rights reserved.

</p>


</div>

</body>
</html>
