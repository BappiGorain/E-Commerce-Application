<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSmart | Customer Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeUp 0.7s ease-out both;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Include Navbar Fragment -->
  <div th:replace="~{navbar :: navbar}"></div>

  <!-- Push content below fixed navbar -->
  <div class="mt-24">

    <!-- Hero Section -->
    <section class="bg-blue-600 text-white">
      <div class="max-w-7xl mx-auto px-6 py-20 text-center animate-fade">
        <h2 class="text-4xl md:text-5xl font-bold leading-tight">
          Smart Shopping Starts Here
        </h2>
        <p class="mt-4 text-lg text-blue-100 max-w-2xl mx-auto">
          Discover quality products, seamless checkout, and fast delivery —
          all in one modern shopping experience.
        </p>
      </div>
    </section>

    <!-- Stats Section -->
    <section class="max-w-7xl mx-auto px-6 py-16">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-center">

        <div class="bg-white rounded-lg shadow-md p-6">
          <h3 class="text-3xl font-bold text-blue-700">10K+</h3>
          <p class="text-gray-600 mt-2">Happy Customers</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
          <h3 class="text-3xl font-bold text-blue-700">5K+</h3>
          <p class="text-gray-600 mt-2">Products Available</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
          <h3 class="text-3xl font-bold text-blue-700">24/7</h3>
          <p class="text-gray-600 mt-2">Customer Support</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
          <h3 class="text-3xl font-bold text-blue-700">Fast</h3>
          <p class="text-gray-600 mt-2">Secure Checkout</p>
        </div>

      </div>
    </section>

  </div>

  <footer class="bg-white border-t">
    <div class="max-w-7xl mx-auto px-6 py-6 text-sm text-gray-500 text-center">
      © 2026 ShopSmart. All rights reserved.
    </div>
  </footer>

</body>
</html>
