<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - Orders</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200">

<div th:replace="~{admin/navbar :: adminNavbar}"></div>

<div class="max-w-7xl mx-auto px-6 pt-24 pb-16">

  <!-- HEADER -->
  <div class="mb-10">
    <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text">
      Orders Management
    </h1>
    <p class="text-gray-500 mt-2">Manage and track all customer orders</p>
  </div>

  <!-- EMPTY -->
  <div th:if="${#lists.isEmpty(orders)}"
       class="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-10 text-center">
    <p class="text-lg text-gray-500">No orders found.</p>
  </div>

  <!-- ORDERS -->
  <div class="space-y-8">

    <div th:each="order : ${orders}"
         class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl shadow-xl overflow-hidden">

      <!-- HEADER -->
      <div class="p-6 flex flex-col md:flex-row md:justify-between md:items-center gap-6 border-b">

        <div class="flex flex-wrap gap-8">

          <div>
            <p class="text-sm text-gray-500">Order ID</p>
            <p class="font-semibold text-lg" th:text="${order.id}"></p>
          </div>

          <div>
            <p class="text-sm text-gray-500">User</p>
            <p th:text="${order.user.email}"></p>
          </div>

          <div>
            <p class="text-sm text-gray-500">Total</p>
            <p class="text-lg font-semibold text-indigo-600">
              ₹ <span th:text="${order.totalPrice}"></span>
            </p>
          </div>

        </div>

        <!-- STATUS -->
        <span
          class="px-4 py-2 text-sm rounded-full font-semibold"
          th:classappend="
          ${order.status.name() == 'CREATED'} ? ' bg-yellow-100 text-yellow-700' :
          (${order.status.name() == 'PACKED'} ? ' bg-orange-100 text-orange-700' :
          (${order.status.name() == 'SHIPPED'} ? ' bg-blue-100 text-blue-700' :
          (${order.status.name() == 'DELIVERED'} ? ' bg-green-100 text-green-700' :
          (${order.status.name() == 'CANCELLED'} ? ' bg-red-100 text-red-700' :
          ' bg-gray-100 text-gray-700'))))"
          th:text="${#strings.capitalize(order.status.name().toLowerCase())}">
        </span>

      </div>

      <!-- ACTIONS -->
      <div class="p-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4">

        <form th:action="@{/admin/orders/updateStatus}" method="post" class="flex gap-3 items-center">

          <input type="hidden" name="orderId" th:value="${order.id}" />

          <select name="status"
                  class="px-4 py-2 rounded-lg border border-gray-300 dark:bg-slate-800 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">

            <option value="PACKED">Packed</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>

          </select>

          <button type="submit"
                  class="px-5 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition">
            Update
          </button>

        </form>

        <!-- OPTIONAL INFO -->
        <div class="text-sm text-gray-500">
          Update order status carefully — customers are notified.
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
