<!doctype html>

<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Product Management | Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* animation */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-up {
        animation: fadeUp 0.6s ease forwards;
      }

      /* hover effects */

      .table-row {
        transition: all 0.25s ease;
      }

      .table-row:hover {
        transform: scale(1.01);
        background: rgba(0, 0, 0, 0.02);
      }

      /* card hover */

      .card-hover {
        transition: all 0.25s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }

      /* image hover */

      .product-img {
        transition: transform 0.2s ease;
      }

      .product-img:hover {
        transform: scale(1.08);
      }

      /* description clamp */

      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>

  <body
    class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200 transition-colors duration-300"
  >
    <!-- NAVBAR -->

    <div th:replace="~{admin/navbar :: adminNavbar}"></div>

    <div class="max-w-7xl mx-auto px-6 pt-28 pb-16 fade-up">
      <!-- HEADER -->

      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-10 gap-4"
      >
        <div>
          <h1
            class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text"
          >
            Product Management
          </h1>

          <p class="text-gray-500 mt-1">Manage and organize store products</p>
        </div>

        <a
          th:href="@{/admin/product/addProduct}"
          class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 hover:scale-105 shadow-lg transition"
        >
          Add New Product
        </a>
      </div>

      <!-- DESKTOP TABLE -->

      <div
        class="hidden md:block bg-white dark:bg-slate-900 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-xl overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead
              class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white"
            >
              <tr class="text-left text-xs uppercase">
                <th class="px-6 py-4">Product</th>
                <th class="px-6 py-4">Price</th>
                <th class="px-6 py-4">Brand</th>
                <th class="px-6 py-4">Stock</th>
                <th class="px-6 py-4">Manufacture</th>
                <th class="px-6 py-4">Expiry</th>
                <th class="px-6 py-4 text-center">Actions</th>
              </tr>
            </thead>

            <tbody class="divide-y divide-gray-200 dark:divide-slate-800">
              <tr th:each="product : ${products}" class="table-row">
                <!-- PRODUCT COLUMN -->

                <td class="px-6 py-4">
                  <div class="flex items-center gap-4">
                    <img
                      th:src="@{'/images/products/' + ${product.image}}"
                      class="w-14 h-14 rounded-lg object-cover border border-gray-200 product-img"
                    />

                    <div class="flex flex-col">
                      <span
                        class="font-semibold text-gray-800 dark:text-gray-200"
                        th:text="${product.name}"
                      >
                      </span>

                      <span
                        class="text-xs text-gray-500 line-clamp-2 max-w-xs"
                        th:text="${product.description}"
                      >
                      </span>
                    </div>
                  </div>
                </td>

                <!-- PRICE -->

                <td class="px-6 py-4 font-semibold text-green-600">
                  ₹ <span th:text="${product.price}"></span>
                </td>

                <!-- BRAND -->

                <td
                  class="px-6 py-4 text-gray-600 dark:text-gray-400"
                  th:text="${product.brand}"
                ></td>

                <!-- STOCK -->

                <td class="px-6 py-4">
                  <span
                    th:if="${product.unitLeft > 10}"
                    class="px-3 py-1 text-xs bg-green-100 text-green-700 rounded-full"
                  >
                    <span th:text="${product.unitLeft}"></span>
                    Available
                  </span>

                  <span
                    th:if="${product.unitLeft <= 10}"
                    class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded-full"
                  >
                    <span th:text="${product.unitLeft}"></span>
                    Low
                  </span>
                </td>

                <!-- MFG -->

                <td
                  class="px-6 py-4 text-gray-600 dark:text-gray-400"
                  th:text="${product.manufactureDate}"
                ></td>

                <!-- EXPIRY -->

                <td class="px-6 py-4">
                  <span
                    th:if="${product.expirationDate != null}"
                    th:text="${product.expirationDate}"
                  >
                  </span>

                  <span
                    th:if="${product.expirationDate == null}"
                    class="italic text-gray-400"
                  >
                    No Expiry
                  </span>
                </td>

                <!-- ACTIONS -->

                <td class="px-6 py-4 text-center">
                  <div class="flex justify-center gap-3">
                    <a
                      th:href="@{/admin/product/updateProduct/{id}(id=${product.id})}"
                      class="px-4 py-2 text-xs font-semibold bg-yellow-400 hover:bg-yellow-500 rounded-lg shadow transition"
                    >
                      Edit
                    </a>

                    <a
                      th:href="@{/admin/product/deleteProduct/{id}(id=${product.id})}"
                      class="px-4 py-2 text-xs font-semibold bg-red-500 text-white hover:bg-red-600 rounded-lg shadow transition"
                    >
                      Delete
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- MOBILE CARDS -->

      <div class="grid gap-5 md:hidden">
        <div
          th:each="product : ${products}"
          class="bg-white dark:bg-slate-900 rounded-xl border border-gray-200 dark:border-slate-800 p-5 card-hover"
        >
          <div class="flex gap-4 items-start">
            <img
              th:src="@{'/images/products/' + ${product.image}}"
              class="w-16 h-16 rounded-lg object-cover border border-gray-200 product-img"
            />

            <div class="flex-1">
              <h2
                class="font-semibold text-lg text-indigo-600"
                th:text="${product.name}"
              ></h2>

              <p
                class="text-xs text-gray-500 line-clamp-2"
                th:text="${product.description}"
              ></p>

              <span class="font-bold text-green-600 text-sm">
                ₹ <span th:text="${product.price}"></span>
              </span>
            </div>
          </div>

          <div class="mt-3 text-sm text-gray-500">
            Brand: <span th:text="${product.brand}"></span>
          </div>

          <div class="mt-3">
            <span
              th:if="${product.unitLeft > 10}"
              class="px-3 py-1 text-xs bg-green-100 text-green-700 rounded-full"
            >
              <span th:text="${product.unitLeft}"></span>
              Available
            </span>

            <span
              th:if="${product.unitLeft <= 10}"
              class="px-3 py-1 text-xs bg-red-100 text-red-700 rounded-full"
            >
              <span th:text="${product.unitLeft}"></span>
              Low Stock
            </span>
          </div>

          <div class="mt-4 flex gap-3">
            <a
              th:href="@{/admin/product/updateProduct/{id}(id=${product.id})}"
              class="flex-1 text-center px-4 py-2 text-sm bg-yellow-400 hover:bg-yellow-500 rounded-lg shadow transition"
            >
              Edit
            </a>

            <a
              th:href="@{/admin/product/deleteProduct/{id}(id=${product.id})}"
              class="flex-1 text-center px-4 py-2 text-sm bg-red-500 text-white hover:bg-red-600 rounded-lg shadow transition"
            >
              Delete
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
