<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Product | Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Animation */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-up {
        animation: fadeUp 0.6s ease forwards;
      }

      /* Card hover */

      .card-hover {
        transition: all 0.25s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>

  <body
    class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200 transition-colors duration-300"
  >
    <!-- NAVBAR -->
    <div th:replace="~{admin/navbar :: adminNavbar}"></div>

    <div class="max-w-5xl mx-auto px-6 pt-28 pb-16 fade-up">
      <!-- PAGE HEADER -->

      <div class="mb-10">
        <h1
          class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text"
        >
          Add New Product
        </h1>

        <p class="text-gray-500 mt-2">
          Create and manage products for your store.
        </p>
      </div>

      <!-- FORM CARD -->

      <div
        class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-xl p-8 card-hover"
      >
            <form
            th:action="@{/admin/product/addProduct}"
            th:object="${product}"
            method="post"
            enctype="multipart/form-data"
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
          >
          <!-- PRODUCT NAME -->

          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1"> Product Name </label>

            <input
              type="text"
              th:field="*{name}"
              placeholder="Enter product name"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />

            <p
              th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"
              class="text-red-500 text-sm mt-1"
            ></p>
          </div>

          <!-- PRICE -->

          <div>
            <label class="block text-sm font-medium mb-1"> Price </label>

            <input
              type="number"
              step="0.01"
              th:field="*{price}"
              placeholder="Enter price"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />

            <p
              th:if="${#fields.hasErrors('price')}"
              th:errors="*{price}"
              class="text-red-500 text-sm mt-1"
            ></p>
          </div>

          <!-- BRAND -->

          <div>
            <label class="block text-sm font-medium mb-1"> Brand </label>

            <input
              type="text"
              th:field="*{brand}"
              placeholder="Enter brand"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />
          </div>

          <!-- UNITS -->

          <div>
            <label class="block text-sm font-medium mb-1">
              Units Available
            </label>

            <input
              type="number"
              th:field="*{unitLeft}"
              placeholder="Available units"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />

            <p
              th:if="${#fields.hasErrors('unitLeft')}"
              th:errors="*{unitLeft}"
              class="text-red-500 text-sm mt-1"
            ></p>
          </div>

          <!-- CATEGORY -->

          <div>
            <label class="block text-sm font-medium mb-1"> Category </label>

            <select
              name="categoryId"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            >
              <option value="">Select Category</option>

              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
              ></option>
            </select>
          </div>

          <!-- DESCRIPTION -->

          <div>
            <label class="block text-sm font-medium mb-1"> Description </label>

            <input
              type="text"
              th:field="*{description}"
              placeholder="Enter description"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />
          </div>

          <!-- MANUFACTURE DATE -->

          <div>
            <label class="block text-sm font-medium mb-1">
              Manufacture Date
            </label>

            <input
              type="date"
              th:field="*{manufactureDate}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />

            <p
              th:if="${#fields.hasErrors('manufactureDate')}"
              th:errors="*{manufactureDate}"
              class="text-red-500 text-sm mt-1"
            ></p>
          </div>

          <!-- EXPIRATION DATE -->

          <div>
            <label class="block text-sm font-medium mb-1">
              Expiration Date
            </label>

            <input
              type="date"
              th:field="*{expirationDate}"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            />
          </div>

          

          
            <!-- Product Image -->
            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-1">Product Image</label>

              <input
                type="file"
                name="imageFile"
                accept="image/*"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800"
              />
            </div>
          

          <!-- BUTTONS -->

          <div
            class="md:col-span-2 flex flex-col sm:flex-row justify-between gap-4 pt-6 border-t border-gray-200 dark:border-slate-800"
          >
            <a
              th:href="@{/admin/product/allProducts}"
              class="px-5 py-2.5 rounded-lg bg-gray-200 dark:bg-slate-800 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-700 transition"
            >
              All Products
            </a>

            <div class="flex gap-3">
              <button
                type="reset"
                class="px-5 py-2.5 rounded-lg border border-gray-300 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 transition"
              >
                Clear
              </button>

              <button
                type="submit"
                class="px-6 py-2.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 hover:scale-[1.02] shadow-md transition"
              >
                Add Product
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
