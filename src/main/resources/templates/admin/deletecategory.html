<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Delete Category | Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.6s ease forwards;
    }
  </style>
</head>

<body
  class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200 transition-colors duration-300"
>
  <!-- NAVBAR -->


  <div class="max-w-4xl mx-auto px-6 pt-28 pb-16 fade-up">

    <!-- PAGE HEADER -->

    <div class="mb-10">
      <h1
        class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-red-600 to-pink-600 text-transparent bg-clip-text"
      >
        Delete Category
      </h1>

      <p class="text-gray-500 mt-2">
        This action will permanently remove the category.
      </p>
    </div>

    <!-- DELETE CARD -->

    <div
      class="bg-white dark:bg-slate-900 rounded-2xl border border-red-200 dark:border-red-800 shadow-xl p-8"
    >
      <!-- WARNING -->

      <div
        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-6 mb-8"
      >
        <p class="text-red-600 font-semibold mb-2">
          ⚠ Warning
        </p>

        <p class="text-gray-600 dark:text-gray-300 text-sm">
          This action <span class="font-semibold text-red-600">cannot be undone</span>.
          Please confirm that you want to delete this category.
        </p>
      </div>

      <!-- CATEGORY DETAILS -->

      <div class="grid grid-cols-1 gap-6 mb-8">

        <div>
          <label class="block text-sm font-medium mb-2">
            Category ID
          </label>

          <div
            class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-500"
          >
            <span th:text="${category.id}"></span>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">
            Category Name
          </label>

          <div
            class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-slate-800 border border-gray-300 dark:border-slate-700"
          >
            <span th:text="${category.name}"></span>
          </div>
        </div>

      </div>

      <!-- ACTION BUTTONS -->

      <form
        th:action="@{/admin/category/deleteCategory/{id}(id=${category.id})}"
        method="post"
        class="border-t border-gray-200 dark:border-slate-800 pt-6 flex flex-col sm:flex-row justify-between gap-4"
      >

        <a
          th:href="@{/admin/category/allCategories}"
          class="px-5 py-2.5 rounded-lg bg-gray-200 dark:bg-slate-800 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-700 transition"
        >
          ← Back to Categories
        </a>

        <button
          type="submit"
          class="px-6 py-2.5 rounded-lg bg-red-600 text-white hover:bg-red-700 hover:scale-[1.02] shadow-md transition"
        >
          Delete Category
        </button>

      </form>

    </div>

  </div>
</body>
</html>
