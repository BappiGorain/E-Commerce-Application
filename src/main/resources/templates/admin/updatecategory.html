<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Category | Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

/* Animation */

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.fade-up{
animation:fadeUp .6s ease forwards;
}

</style>

</head>


<body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200 transition-colors duration-300">

<!-- NAVBAR -->
<div th:replace="~{navbar :: navbar}"></div>


<div class="max-w-4xl mx-auto px-6 pt-28 pb-16 fade-up">


<!-- PAGE HEADER -->

<div class="mb-10">

<h1 class="text-3xl md:text-4xl font-bold
bg-gradient-to-r from-indigo-600 to-purple-600
text-transparent bg-clip-text">

Update Category

</h1>

<p class="text-gray-500 mt-2">

Modify category information and save changes.

</p>

</div>



<!-- FORM CARD -->

<div class="bg-white dark:bg-slate-900
rounded-2xl
border border-gray-200 dark:border-slate-800
shadow-xl
p-8">


<form th:action="@{/category/updateCategory}"
th:object="${category}"
method="post"
class="space-y-8">


<!-- HIDDEN ID -->

<input type="hidden" th:field="*{id}" />


<div class="grid grid-cols-1 gap-6">


<!-- CATEGORY ID -->

<div>

<label class="block text-sm font-medium mb-2">

Category ID

</label>

<input
type="text"
th:value="${category.id}"
readonly

class="w-full px-4 py-3
rounded-xl
bg-gray-100 dark:bg-slate-800
border border-gray-300 dark:border-slate-700
text-gray-500
cursor-not-allowed">

</div>



<!-- CATEGORY NAME -->

<div>

<label class="block text-sm font-medium mb-2">

Category Name

</label>

<input
type="text"
th:field="*{name}"
placeholder="e.g. Electronics, Clothing"

class="w-full px-4 py-3
rounded-xl
border border-gray-300 dark:border-slate-700
bg-white dark:bg-slate-800
focus:outline-none
focus:ring-2
focus:ring-indigo-500
transition">


<p th:if="${#fields.hasErrors('name')}"
th:errors="*{name}"
class="text-red-500 text-sm mt-2"></p>

</div>


</div>



<!-- ACTION BUTTONS -->

<div class="border-t border-gray-200 dark:border-slate-800
pt-6
flex flex-col sm:flex-row
justify-between
gap-4">


<a th:href="@{/category/allCategories}"

class="px-5 py-2.5
rounded-lg
bg-gray-200 dark:bg-slate-800
text-gray-700 dark:text-gray-300
hover:bg-gray-300 dark:hover:bg-slate-700
transition">

← Back to Categories

</a>


<div class="flex gap-3">


<button type="reset"

class="px-6 py-2.5
rounded-lg
border border-gray-300 dark:border-slate-700
hover:bg-gray-100 dark:hover:bg-slate-800
transition">

Reset

</button>


<button type="submit"

class="px-6 py-2.5
rounded-lg
bg-indigo-600
text-white
hover:bg-indigo-700
hover:scale-[1.02]
shadow-md
transition">

Update Category

</button>


</div>

</div>


</form>

</div>

</div>

</body>
</html>
