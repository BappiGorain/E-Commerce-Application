<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Category | Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Animation */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-up {
        animation: fadeUp 0.6s ease forwards;
      }

      /* Hover effect */

      .card-hover {
        transition: all 0.25s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>

  <body
    class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200 transition-colors duration-300"
  >
    <!-- NAVBAR -->
    <div th:replace="~{admin/navbar :: adminNavbar}"></div>

    <div class="max-w-4xl mx-auto px-6 pt-28 pb-16 fade-up">
      <!-- PAGE HEADER -->

      <div class="mb-10">
        <h1
          class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text"
        >
          Add New Category
        </h1>

        <p class="text-gray-500 mt-2">
          Create a category to organize your products.
        </p>
      </div>

      <!-- FORM CARD -->

      <div
        class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-xl p-8 card-hover"
      >
        <form
          th:action="@{/admin/category/addCategory}"
          th:object="${category}"
          method="post"
          class="space-y-8"
        >
          <!-- CATEGORY NAME -->

          <div>
            <label class="block text-sm font-medium mb-2">
              Category Name
            </label>

            <div class="relative">
              <input
                type="text"
                th:field="*{name}"
                placeholder="e.g. Electronics, Clothing"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
              />

              <p
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}"
                class="text-red-500 text-sm mt-2"
              ></p>
            </div>

            <p class="text-xs text-gray-400 mt-2">
              Use a clear and descriptive category name.
            </p>
          </div>

          <!-- ACTION BUTTONS -->

          <div
            class="border-t border-gray-200 dark:border-slate-800 pt-6 flex flex-col sm:flex-row sm:justify-between gap-4"
          >
            <a
              th:href="@{/admin/category/allCategories}"
              class="px-5 py-2.5 rounded-lg bg-gray-200 dark:bg-slate-800 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-700 transition"
            >
              ← Back to Categories
            </a>

            <div class="flex gap-3">
              <button
                type="reset"
                class="px-6 py-2.5 rounded-lg border border-gray-300 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 transition"
              >
                Clear
              </button>

              <button
                type="submit"
                class="px-6 py-2.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 hover:scale-[1.02] shadow-md transition"
              >
                Add Category
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
