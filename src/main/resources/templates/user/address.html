<!doctype html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Add Shipping Address</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-xl rounded-xl w-full max-w-3xl p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
        Add Shipping Address
      </h2>

      <form
        th:action="@{/address/addAddress}"
        method="post"
        th:object="${address}"
        class="space-y-5"
      >
        <!-- used to detect checkout flow -->

        <input type="hidden" name="checkout" value="true" />

        <!-- Name -->

        <div>
          <label class="block text-sm font-medium text-gray-600">
            Name
          </label>

          <input
            type="text"
            th:field="*{name}"
            placeholder="Enter Name"
            class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- PHONE NUMBER -->

        <div>
          <label class="block text-sm font-medium text-gray-600">
            Phone Number
          </label>

          <input
            type="tel"
            th:field="*{phoneNumber}"
            placeholder="Enter phone number"
            class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <!-- ADDRESS / STREET -->

        <div>
          <label class="block text-sm font-medium text-gray-600">
            Address
          </label>

          <textarea
            th:field="*{place}"
            rows="3"
            placeholder="House No, Street, Area"
            class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          ></textarea>
        </div>

        <!-- CITY + STATE -->

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600">
              City
            </label>

            <input
              type="text"
              th:field="*{city}"
              placeholder="City"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600">
              State
            </label>

            <input
              type="text"
              th:field="*{state}"
              placeholder="State"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>
        </div>

        <!-- PINCODE + COUNTRY -->

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-600">
              Pincode
            </label>

            <input
              type="text"
              th:field="*{pincode}"
              placeholder="Pincode"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600">
              Country
            </label>

            <input
              type="text"
              th:field="*{country}"
              placeholder="Country"
              value="India"
              class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>
        </div>

        <!-- BUTTONS -->

        <div class="flex justify-between pt-6">
          <a
            href="/address/showAddress"
            class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg transition"
          >
            Cancel
          </a>

          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-8 py-3 rounded-lg transition"
          >
            Save Address
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
