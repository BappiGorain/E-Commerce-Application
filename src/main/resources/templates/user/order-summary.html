<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Summary</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200">
    <div class="max-w-6xl mx-auto px-6 pt-28 pb-16">
      <!-- TITLE -->

      <div class="mb-10">
        <h1
          class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text"
        >
          Order Summary
        </h1>

        <p class="text-gray-500 mt-2">Review your order before placing it</p>
      </div>

      <!-- ADDRESS -->

      <div class="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-6 mb-10">
        <h2 class="text-lg font-semibold mb-4">Delivery Address</h2>

        <div
          th:if="${address!=null}"
          class="text-gray-600 dark:text-gray-300 space-y-1"
        >
          <p class="font-semibold" th:text="${address.name}"></p>

          <p>
            <span th:text="${address.city}"></span>,
            <span th:text="${address.state}"></span>
          </p>

          <p>
            <span th:text="${address.country}"></span> -
            <span th:text="${address.pincode}"></span>
          </p>

          <p>
            Phone :
            <span th:text="${address.phoneNumber}"></span>
          </p>
        </div>
      </div>

      <!-- ITEMS -->

      <div class="space-y-6">
        <div
          th:each="item : ${cartItems}"
          class="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-6 flex gap-6 items-center"
        >
          <!-- IMAGE -->

          <img
            th:src="@{'/images/products/' + ${item.product.image}}"
            class="w-24 h-24 object-cover rounded-lg border"
          />

          <!-- PRODUCT INFO -->

          <div class="flex-1">
            <h3
              class="font-semibold text-lg"
              th:text="${item.product.name}"
            ></h3>

            <p class="text-sm text-gray-500">
              Brand :
              <span th:text="${item.product.brand}"></span>
            </p>
          </div>

          <!-- PRICE -->

          <div class="text-center">
            <p class="text-gray-500 text-sm">Price</p>

            <p class="font-semibold">
              ₹ <span th:text="${item.product.price}"></span>
            </p>
          </div>

          <!-- QUANTITY -->

          <div class="text-center">
            <p class="text-gray-500 text-sm">Qty</p>

            <p class="font-semibold" th:text="${item.quantity}"></p>
          </div>

          <!-- SUBTOTAL -->

          <div class="text-center">
            <p class="text-gray-500 text-sm">Subtotal</p>

            <p class="font-semibold text-indigo-600">
              ₹ <span th:text="${item.product.price * item.quantity}"></span>
            </p>
          </div>
        </div>
      </div>

      <!-- TOTAL -->

      <div
        class="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-6 mt-10 flex justify-between items-center"
      >
        <a
          href="/user/cart"
          class="px-5 py-2 rounded-lg bg-gray-200 dark:bg-slate-800 hover:bg-gray-300"
        >
          ← Back to Cart
        </a>

        <h2 class="text-2xl font-bold">
          Total : ₹ <span th:text="${totalPrice}"></span>
        </h2>
      </div>

      <!-- PLACE ORDER -->

      <div class="flex justify-end mt-8">
        <form th:action="@{/place-order}" method="post">
          <input type="hidden" name="addressId" th:value="${address.id}" />

          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <button
            class="px-8 py-3 bg-green-600 text-white rounded-xl font-semibold hover:bg-green-700 shadow-lg"
          >
            Place Order
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
