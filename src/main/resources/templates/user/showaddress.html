<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Select Address</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto py-10 px-6">
      <h2 class="text-3xl font-semibold mb-8 text-gray-800">
        Select Shipping Address
      </h2>

      <form th:action="@{/checkout/address}" method="post">
        <div class="grid gap-5">
          <!-- Address Card -->
          <div
            th:each="address : ${addressess}"
            class="bg-white border rounded-xl p-5 shadow-sm hover:shadow-md transition"
          >
            <label class="flex items-start gap-4 cursor-pointer">
              <input
                type="radio"
                name="addressId"
                th:value="${address.id}"
                class="mt-2 accent-indigo-600"
                required
              />

              <div>
                <p class="font-semibold text-lg" th:text="${address.place}"></p>

                <p
                  class="text-gray-600"
                  th:text="${address.city} + ', ' + ${address.state}"
                ></p>

                <p class="text-gray-600" th:text="${address.pincode}"></p>

                <p class="text-gray-600" th:text="${address.country}"></p>

                <p
                  class="text-gray-700 font-medium mt-1"
                  th:text="'Phone: ' + ${address.phoneNumber}"
                ></p>
                <div class="flex justify-end mt-3">
                  <form
                    th:action="@{/address/delete/{id}(id=${address.id})}"
                    method="post"
                  >
                    <button
                      type="submit"
                      class="text-red-600 text-sm hover:underline"
                    >
                      Delete
                    </button>
                  </form>
                </div>
              </div>
            </label>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex justify-between items-center mt-8">
          <a
            th:href="@{/address/addAddress}"
            class="text-indigo-600 font-medium hover:underline"
          >
            + Add New Address
          </a>

          <a 
            th:href="@{/address/ordersummary}"
            class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition inline-block"
          >
            order summary
          </a>


        </div>
      </form>
    </div>
  </body>
</html>
