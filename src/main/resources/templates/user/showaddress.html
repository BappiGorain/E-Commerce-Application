<!doctype html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Shipping Address</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
}
</style>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-5xl mx-auto py-10 px-6">

<h2 class="text-3xl font-semibold mb-8 text-gray-800">
Select Shipping Address
</h2>

<!-- ORDER SUMMARY FORM -->

<form th:action="@{/address/ordersummary}" method="get">

<div class="grid gap-6">

<div th:each="address : ${addresses}"
class="bg-white border rounded-xl p-6 shadow-sm hover:shadow-md transition">

<div class="flex justify-between items-start">

<label class="flex items-start gap-4 cursor-pointer flex-1">

<input type="radio"
name="addressId"
th:value="${address.id}"
class="mt-2 accent-indigo-600"
required>

<div>

  <h3 class="text-gray-600 font-extrabold"
th:text="${address.name}">
</h3>

<p class="font-semibold text-lg"
th:text="${address.place}">
</p>

<p class="text-gray-600"
th:text="${address.city} + ', ' + ${address.state}">
</p>

<p class="text-gray-600"
th:text="${address.pincode}">
</p>

<p class="text-gray-600"
th:text="${address.country}">
</p>

<p class="text-gray-700 font-medium mt-1"
th:text="'Phone: ' + ${address.phoneNumber}">
</p>

</div>

</label>

<!-- DELETE BUTTON -->

<button type="button"
th:onclick="'deleteAddress(' + ${address.id} + ')'"
class="text-red-600 text-sm hover:underline">

Delete

</button>

</div>

</div>

</div>

<div class="flex justify-between items-center mt-8">

<a th:href="@{/address/addAddress}"
class="text-indigo-600 font-medium hover:underline">

* Add New Address

</a>

<button type="submit"
class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition">

Proceed to Order Summary

</button>

</div>

</form>

<!-- HIDDEN DELETE FORM -->

<form id="deleteForm" method="post">
<input type="hidden" name="_csrf" th:value="${_csrf.token}">
</form>

</div>

<script>
function deleteAddress(id){
    const form = document.getElementById("deleteForm");
    form.action = "/address/delete/" + id;
    form.submit();
}
</script>

</body>

</html>
