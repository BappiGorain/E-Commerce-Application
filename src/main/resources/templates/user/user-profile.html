<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard | ShopSmart</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

/* fade animation */

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.fade-up{
animation:fadeUp .7s ease forwards;
}

/* hover card */

.card{
transition:all .25s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

</style>

</head>


<body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200">

<!-- NAVBAR -->

<div th:replace="~{navbar :: navbar}"></div>


<div class="max-w-7xl mx-auto px-6 pt-28 pb-16 fade-up">

<!-- PAGE TITLE -->

<h1 class="text-4xl font-bold mb-10
bg-gradient-to-r from-indigo-600 to-purple-600
text-transparent bg-clip-text">

User Dashboard

</h1>



<div class="grid grid-cols-12 gap-8">

<!-- LEFT PROFILE CARD -->

<div class="col-span-12 md:col-span-4">

<div class="bg-white dark:bg-slate-900
rounded-2xl border border-gray-200 dark:border-slate-800
shadow-xl p-8 text-center card">


<img
th:src="'https://ui-avatars.com/api/?name=' + ${user.name} + '&background=6366f1&color=fff&size=128'"
class="w-28 h-28 rounded-full mx-auto mb-5 shadow-lg">


<h2 class="text-2xl font-bold"
th:text="${user.name}">
</h2>


<p class="text-gray-500"
th:text="${user.email}">
</p>


<span
class="inline-block mt-3
bg-indigo-100 dark:bg-indigo-900
text-indigo-700 dark:text-indigo-300
px-4 py-1 rounded-full text-sm font-semibold"
th:text="${user.role}">
</span>


<a
href="/user/orders"
class="mt-6 block bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">

View Orders

</a>

</div>

</div>



<!-- RIGHT SIDE CONTENT -->

<div class="col-span-12 md:col-span-8 space-y-8">


<!-- STATS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div class="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white p-6 rounded-2xl shadow-lg card">

<p class="text-sm opacity-80">
Total Orders
</p>

<p class="text-3xl font-bold mt-2"
th:text="${orderCount}">
</p>

</div>



<div class="bg-gradient-to-r from-purple-500 to-purple-600 text-white p-6 rounded-2xl shadow-lg card">

<p class="text-sm opacity-80">
Products Ordered
</p>

<p class="text-3xl font-bold mt-2"
th:text="${productCount}">
</p>

</div>



<div class="bg-gradient-to-r from-pink-500 to-rose-500 text-white p-6 rounded-2xl shadow-lg card">

<p class="text-sm opacity-80">
Available Products
</p>

<p class="text-3xl font-bold mt-2">

5000+

</p>

</div>

</div>



<!-- RECENT ORDERS -->

<div class="bg-white dark:bg-slate-900
rounded-2xl border border-gray-200 dark:border-slate-800
shadow-xl p-8">

<h2 class="text-lg font-semibold mb-6">

Recent Orders

</h2>


<div th:if="${#lists.isEmpty(orders)}">

<p class="text-gray-500">

No orders yet.

</p>

</div>


<div class="space-y-4">


<div
th:each="order : ${orders}"
class="flex items-center justify-between border-b border-gray-200 dark:border-slate-800 pb-4 card">


<div>

<p class="font-semibold">

Order #<span th:text="${order.id}"></span>

</p>

<p class="text-sm text-gray-500"
th:text="${#temporals.format(order.createdAt,'dd MMM yyyy')}">
</p>

</div>


<div>

<span
class="px-3 py-1 rounded-full text-sm font-medium bg-yellow-100 text-yellow-700"
th:text="${order.status}">
</span>

</div>


<div class="font-semibold text-indigo-600">

₹ <span th:text="${order.totalPrice}"></span>

</div>

</div>

</div>


<a
href="/user/orders"
class="inline-block mt-6 text-indigo-600 hover:underline">

View All Orders →

</a>


</div>



<!-- ACCOUNT DETAILS -->

<div class="bg-white dark:bg-slate-900
rounded-2xl border border-gray-200 dark:border-slate-800
shadow-xl p-8">

<h2 class="text-lg font-semibold mb-6">

Account Information

</h2>


<div class="grid grid-cols-1 md:grid-cols-2 gap-6">


<div>

<p class="text-sm text-gray-500">
Full Name
</p>

<p class="font-semibold"
th:text="${user.name}">
</p>

</div>


<div>

<p class="text-sm text-gray-500">
Email
</p>

<p class="font-semibold"
th:text="${user.email}">
</p>

</div>


<div>

<p class="text-sm text-gray-500">
Role
</p>

<p class="font-semibold"
th:text="${user.role}">
</p>

</div>


<div>

<p class="text-sm text-gray-500">
Joined
</p>

<p class="font-semibold text-gray-400">
Not Available
</p>

</div>


</div>

</div>


</div>

</div>


</div>

</body>
</html>
