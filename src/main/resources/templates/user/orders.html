<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Orders</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 dark:bg-slate-950 text-gray-800 dark:text-gray-200">
    <!-- NAVBAR -->
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="max-w-7xl mx-auto px-6 pt-28 pb-16">
      <!-- PAGE TITLE -->

      <div class="mb-12">
        <h1
          class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text"
        >
          My Orders
        </h1>

        <p class="text-gray-500 mt-2">Track and manage your purchases</p>
      </div>

      <!-- EMPTY ORDERS -->

      <div
        th:if="${#lists.isEmpty(orders)}"
        class="bg-white dark:bg-slate-900 rounded-xl shadow-lg p-10 text-center"
      >
        <p class="text-lg text-gray-500">You haven't placed any orders yet.</p>

        <a
          th:href="@{/user/products}"
          class="mt-6 inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700"
        >
          Start Shopping
        </a>
      </div>

      <!-- ORDERS LIST -->

      <div class="space-y-10">
        <div
          th:each="order : ${orders}"
          class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl shadow-xl overflow-hidden"
        >
          <!-- ORDER HEADER -->

          <div
            class="p-6 flex flex-col md:flex-row md:justify-between md:items-center gap-6 border-b border-gray-200 dark:border-slate-800"
          >
            <div class="flex flex-wrap gap-8">
              <div>
                <p class="text-sm text-gray-500">Order ID</p>
                <p class="font-semibold text-lg" th:text="${order.id}"></p>
              </div>

              <div>
                <p class="text-sm text-gray-500">Placed On</p>
                <p
                  th:text="${#temporals.format(order.createdAt,'dd MMM yyyy, hh:mm a')}"
                ></p>
              </div>

              <div>
                <p class="text-sm text-gray-500">Total</p>
                <p class="text-lg font-semibold text-indigo-600">
                  ₹ <span th:text="${order.totalPrice}"></span>
                </p>
              </div>
            </div>

            <!-- STATUS BADGE -->

            <span
              class="px-4 py-2 text-sm rounded-full font-semibold"
              th:classappend="${order.status.name() == 'CREATED'} ? ' bg-yellow-100 text-yellow-700' :
                 (${order.status.name() == 'SHIPPED'} ? ' bg-blue-100 text-blue-700' :
                 (${order.status.name() == 'DELIVERED'} ? ' bg-green-100 text-green-700' :
                 ' bg-gray-100 text-gray-700'))"
              th:text="${#strings.capitalize(order.status.name().toLowerCase())}"
            >
            </span>
          </div>

          <!-- ORDER PROGRESS BAR -->

          <div class="px-6 pt-6">
            <div class="flex items-center justify-between text-sm">
              <div class="flex flex-col items-center">
                <div class="w-4 h-4 rounded-full bg-green-500"></div>
                <p class="mt-2">Ordered</p>
              </div>

              <div class="flex-1 h-1 bg-gray-200 mx-2"></div>

              <div class="flex flex-col items-center">
                <div class="w-4 h-4 rounded-full bg-gray-300"></div>
                <p class="mt-2">Packed</p>
              </div>

              <div class="flex-1 h-1 bg-gray-200 mx-2"></div>

              <div class="flex flex-col items-center">
                <div class="w-4 h-4 rounded-full bg-gray-300"></div>
                <p class="mt-2">Shipped</p>
              </div>

              <div class="flex-1 h-1 bg-gray-200 mx-2"></div>

              <div class="flex flex-col items-center">
                <div class="w-4 h-4 rounded-full bg-gray-300"></div>
                <p class="mt-2">Delivered</p>
              </div>
            </div>
          </div>

          <!-- PRODUCTS -->

          <div class="divide-y divide-gray-200 dark:divide-slate-800 mt-6">
            <div
              th:each="item : ${order.items}"
              class="p-6 flex items-center gap-6 hover:bg-gray-50 dark:hover:bg-slate-800/40 transition"
            >
              <img
                th:src="@{'/images/products/' + ${item.product.image}}"
                class="w-20 h-20 object-cover rounded-lg border"
              />

              <div class="flex-1">
                <p
                  class="font-semibold text-lg"
                  th:text="${item.product.name}"
                ></p>

                <p class="text-sm text-gray-500">
                  Brand :
                  <span th:text="${item.product.brand}"></span>
                </p>

                <p class="text-sm text-gray-500">
                  Qty :
                  <span th:text="${item.quantity}"></span>
                </p>
              </div>

              <div class="text-right">
                <p class="text-sm text-gray-500">Subtotal</p>

                <p class="text-lg font-semibold text-indigo-600">
                  ₹ <span th:text="${item.price * item.quantity}"></span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
